name: Release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/ci.yml"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the auto-commit that the workflow itself pushes
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build tomli tomli-w

      - name: Bump patch version
        id: bump
        run: |
          python scripts/bump_version.py --patch
          echo "version=$(python -c "import tomli; print(tomli.load(open('pyproject.toml','rb'))['project']['version'])")" >> $GITHUB_OUTPUT

      - name: Build distribution
        run: python -m build

      - name: Commit version bump and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD --tags

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
          files: dist/*
